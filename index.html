<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDE Agent Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --card-bg: #12121a;
  --card-border: #1e1e2e;
  --card-hover: #1a1a28;
  --gb-darkest: #0f380f;
  --gb-dark: #306230;
  --gb-light: #8bac0f;
  --gb-lightest: #9bbc0f;
  --cde-blue: #2756c7;
  --cde-blue-glow: rgba(39, 86, 199, 0.3);
  --text: #e0e0e0;
  --text-dim: #888;
  --text-bright: #fff;
  --active: #4ade80;
  --testing: #facc15;
  --inactive: #ef4444;
  --content: #818cf8;
  --operations: #f472b6;
  --infrastructure: #38bdf8;
  --font-pixel: 'Press Start 2P', monospace;
  --font-body: 'Inter', system-ui, sans-serif;
}

html { scroll-behavior: smooth; }
body { background: var(--bg); font-family: var(--font-body); color: var(--text); min-height: 100vh; }

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ── IDLE ANIMATIONS ── */
@keyframes idle-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

@keyframes idle-bob-alt {
  0%, 100% { transform: translateY(-2px); }
  50% { transform: translateY(1px); }
}

@keyframes avatar-glow {
  0%, 100% { box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 6px rgba(139,172,15,0.15); }
  50% { box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 14px rgba(139,172,15,0.35); }
}

@keyframes pixel-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

@keyframes shadow-pulse {
  0%, 100% { opacity: 0.6; transform: scaleX(1); }
  50% { opacity: 0.3; transform: scaleX(0.85); }
}

@keyframes status-blink {
  0%, 90%, 100% { opacity: 1; }
  95% { opacity: 0.4; }
}

@keyframes stat-shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes header-pulse {
  0%, 100% { text-shadow: 0 0 20px rgba(155,188,15,0.4), 0 2px 0 var(--gb-dark); }
  50% { text-shadow: 0 0 30px rgba(155,188,15,0.6), 0 2px 0 var(--gb-dark), 0 0 60px rgba(155,188,15,0.15); }
}

@keyframes scanline-avatar {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* ── HEADER ── */
.header {
  padding: 40px 40px 30px;
  border-bottom: 2px solid var(--gb-dark);
  background: linear-gradient(180deg, rgba(15,56,15,0.15) 0%, transparent 100%);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.header h1 {
  font-family: var(--font-pixel); font-size: 20px; color: var(--gb-lightest);
  animation: header-pulse 4s ease-in-out infinite;
  letter-spacing: 2px;
}
.header-badge {
  font-family: var(--font-pixel); font-size: 8px; color: var(--cde-blue);
  letter-spacing: 1px; background: rgba(39,86,199,0.1);
  border: 1px solid rgba(39,86,199,0.3); padding: 6px 12px; border-radius: 4px;
}
.header-stats {
  display: flex; gap: 24px; margin-top: 16px; font-size: 11px; color: var(--text-dim);
  font-family: var(--font-pixel); letter-spacing: 0.5px;
}
.header-stats span { color: var(--gb-light); }
.stat-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.stat-dot.active { background: var(--active); box-shadow: 0 0 6px var(--active); animation: status-blink 3s infinite; }
.stat-dot.testing { background: var(--testing); box-shadow: 0 0 6px var(--testing); animation: status-blink 2s infinite; }

/* ── FILTER BAR ── */
.filters {
  padding: 16px 40px; display: flex; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid var(--card-border);
}
.filter-btn {
  font-family: var(--font-pixel); font-size: 7px; letter-spacing: 1px;
  padding: 6px 14px; border: 1px solid var(--card-border); border-radius: 4px;
  background: transparent; color: var(--text-dim); cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--gb-dark); color: var(--gb-light); }
.filter-btn.active { border-color: var(--gb-light); color: var(--gb-lightest); background: rgba(155,188,15,0.08); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px; padding: 32px 40px;
}

/* ── CARD ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.3s, border-color 0.3s;
  position: relative;
}
.card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--cde-blue-glow);
  border-color: var(--cde-blue);
}
.card:hover .avatar-frame { animation-duration: 0.6s; }
.card:hover .avatar-img { animation-duration: 0.6s; }
.card-top {
  display: flex; align-items: center; gap: 16px; padding: 20px 20px 12px;
}

/* ── AVATAR WITH IDLE ANIMATION ── */
.avatar-frame {
  width: 72px; height: 72px; border-radius: 6px; overflow: hidden;
  border: 2px solid var(--gb-dark); background: var(--gb-darkest);
  flex-shrink: 0; image-rendering: pixelated;
  animation: avatar-glow 3s ease-in-out infinite;
  position: relative;
}
/* Retro scanline sweep on avatar */
.avatar-frame::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(155,188,15,0.06) 50%, transparent 60%);
  animation: scanline-avatar 4s linear infinite;
  pointer-events: none;
  z-index: 1;
}
.avatar-img {
  width: 100%; height: 100%; object-fit: cover;
  image-rendering: pixelated;
  animation: pixel-breathe 2.5s ease-in-out infinite;
}
/* Pixel shadow under avatar */
.avatar-shadow {
  position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 50px; height: 6px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%);
  border-radius: 50%;
  animation: shadow-pulse 2.5s ease-in-out infinite;
  z-index: 0;
}
/* Bobbing wrapper — each card gets a staggered delay via JS */
.avatar-bob {
  animation: idle-bob 2.5s ease-in-out infinite;
  position: relative;
  width: 72px; height: 72px;
  flex-shrink: 0;
}

.card-info { flex: 1; min-width: 0; }
.card-name {
  font-family: var(--font-pixel); font-size: 9px; color: var(--text-bright);
  line-height: 1.6; margin-bottom: 4px;
}
.card-class {
  font-size: 11px; color: var(--gb-light); font-weight: 500;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 3px;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.badge-theme.Content { background: rgba(129,140,248,0.15); color: var(--content); }
.badge-theme.Operations { background: rgba(244,114,182,0.15); color: var(--operations); }
.badge-theme.Infrastructure { background: rgba(56,189,248,0.15); color: var(--infrastructure); }
.badge-status.active { background: rgba(74,222,128,0.12); color: var(--active); }
.badge-status.testing { background: rgba(250,204,21,0.12); color: var(--testing); }
.badge-status.inactive { background: rgba(239,68,68,0.12); color: var(--inactive); }
.badge-type { background: rgba(255,255,255,0.05); color: var(--text-dim); }

/* ── CARD STATS ── */
.card-stats { padding: 0 20px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-row { display: flex; align-items: center; gap: 8px; }
.stat-label {
  font-family: var(--font-pixel); font-size: 6px; color: var(--text-dim);
  width: 42px; flex-shrink: 0; letter-spacing: 0.5px;
}
.stat-bar-bg {
  flex: 1; height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 2px; overflow: hidden; position: relative;
}
.stat-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.stat-bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
}
.stat-bar-fill.int { background: linear-gradient(90deg, var(--gb-dark), var(--gb-lightest)); }
.stat-bar-fill.aut { background: linear-gradient(90deg, #4338ca, #818cf8); }
.stat-bar-fill.spd { background: linear-gradient(90deg, #b45309, #fbbf24); }
.stat-bar-fill.vrs { background: linear-gradient(90deg, #be185d, #f472b6); }
/* Shimmer on hover */
.card:hover .stat-bar-fill::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: stat-shimmer 1.5s linear infinite;
}

/* ── CARD FOOTER ── */
.card-footer {
  padding: 12px 20px; border-top: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-desc {
  font-size: 11px; color: var(--text-dim); line-height: 1.5;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; margin-right: 12px;
}
.card-prompt-btn {
  font-family: var(--font-pixel); font-size: 7px; color: var(--cde-blue);
  background: rgba(39,86,199,0.1); border: 1px solid rgba(39,86,199,0.3);
  padding: 4px 10px; border-radius: 3px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; text-decoration: none;
}
.card-prompt-btn:hover { background: rgba(39,86,199,0.2); color: var(--text-bright); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg); border: 1px solid var(--gb-dark);
  border-radius: 12px; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 40px var(--cde-blue-glow);
}
.modal-header {
  display: flex; align-items: center; gap: 16px;
  padding: 24px; border-bottom: 1px solid var(--card-border);
}
.modal-avatar-wrap {
  animation: idle-bob 2s ease-in-out infinite;
}
.modal-avatar {
  width: 80px; height: 80px; border-radius: 6px; overflow: hidden;
  border: 2px solid var(--gb-dark); background: var(--gb-darkest);
  image-rendering: pixelated;
  animation: avatar-glow 2.5s ease-in-out infinite;
  position: relative;
}
.modal-avatar::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(155,188,15,0.06) 50%, transparent 60%);
  animation: scanline-avatar 3s linear infinite;
  pointer-events: none;
}
.modal-avatar img {
  width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated;
  animation: pixel-breathe 2.5s ease-in-out infinite;
}
.modal-title { font-family: var(--font-pixel); font-size: 10px; color: var(--gb-lightest); }
.modal-class { font-size: 12px; color: var(--gb-light); margin-top: 4px; }
.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.detail-row {
  display: flex; gap: 12px; align-items: baseline;
}
.detail-label {
  font-family: var(--font-pixel); font-size: 7px; color: var(--text-dim);
  letter-spacing: 1px; width: 90px; flex-shrink: 0;
}
.detail-value {
  font-size: 13px; color: var(--text); line-height: 1.5;
}
.detail-value.desc {
  color: var(--text-dim); font-size: 12px;
}
.modal-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  padding: 16px 0; border-top: 1px solid var(--card-border);
  border-bottom: 1px solid var(--card-border);
}
.modal-stats .stat-row { display: flex; align-items: center; gap: 8px; }
.modal-stats .stat-label { width: 42px; }
.modal-stats .stat-bar-bg { flex: 1; }
.modal-stats .stat-val {
  font-family: var(--font-pixel); font-size: 7px; color: var(--gb-light);
  width: 28px; text-align: right;
}
.modal-footer {
  display: flex; gap: 12px; justify-content: space-between;
  padding: 16px 24px 24px;
}
.btn {
  font-family: var(--font-pixel); font-size: 8px; padding: 10px 20px;
  border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s;
  letter-spacing: 1px; text-decoration: none; display: inline-block;
}
.btn-close { background: transparent; color: var(--text-dim); border: 1px solid var(--card-border); }
.btn-close:hover { border-color: var(--text-dim); color: var(--text); }
.btn-prompt { background: rgba(39,86,199,0.15); color: var(--cde-blue); border: 1px solid rgba(39,86,199,0.3); }
.btn-prompt:hover { background: rgba(39,86,199,0.25); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 10000;
  font-family: var(--font-pixel); font-size: 8px;
  padding: 12px 20px; border-radius: 6px;
  background: var(--gb-dark); color: var(--gb-lightest);
  border: 1px solid var(--gb-light);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s ease;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .header, .filters, .grid { padding-left: 16px; padding-right: 16px; }
  .header h1 { font-size: 14px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <h1>CDE AGENT ROSTER</h1>
    <div class="header-badge">CORE DIGITAL EXPANSION</div>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">ALL</button>
  <button class="filter-btn" data-filter="Content">CONTENT</button>
  <button class="filter-btn" data-filter="Operations">OPS</button>
  <button class="filter-btn" data-filter="Infrastructure">INFRA</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── AGENT DATA ──
const agents = [
  { id:"blog-briefing", name:"Blog Briefing Agent", type:"Claude Code", theme:"Content", trigger:"Manual + Scheduled", schedule:"Weekdays 6AM + 9AM", status:"active", model:"Haiku \u2192 Sonnet", promptDocId:"1s7YZ3zvEvEVBhnmlYmX69MqGDWQ4PCqtAL2sm1GHKbc", dependencies:"GDrive MCP, Content Pipeline Sheet", description:"Daily blog research \u2014 teaches topics, develops hooks, crafts narratives, hands off to writer", class:"Scholar" },
  { id:"briefing-refiner", name:"Briefing Refiner", type:"Webhook (Vercel)", theme:"Content", trigger:"Auto \u2014 Sheet status", schedule:"On trigger", status:"active", model:"Haiku", promptDocId:"1jEko65pbIh9S-ANSifFlhVBdzKWVRVomgmIKK8b-3pw", dependencies:"Vercel, Anthropic API, Content Pipeline Sheet", description:"Refines blog briefings based on reviewer feedback notes", class:"Alchemist" },
  { id:"writer", name:"Writer Agent", type:"Webhook (Vercel)", theme:"Content", trigger:"Auto \u2014 Sheet status", schedule:"On trigger", status:"active", model:"Sonnet", promptDocId:"1USjHOaYx76FUJN8LZbdQEOrZMrwmdxC0hNe1D65oMGw", dependencies:"Vercel, Anthropic API, Content Pipeline Sheet", description:"Writes publish-ready blog posts from briefing documents", class:"Bard" },
  { id:"weekly-review", name:"Weekly Review", type:"Scheduled Script", theme:"Content", trigger:"Scheduled", schedule:"Sundays 8PM", status:"active", model:"Opus", promptDocId:"1yhIEz5OnD8cJXQ8Nqs0ZWYRVaJFT6-BDgBti9HgSwzg", dependencies:"Content Pipeline Sheet, GDrive MCP", description:"Weekly summary of all briefings \u2014 extracts themes, suggests next week topics", class:"Oracle" },
  { id:"agent-builder", name:"Agent Builder", type:"Claude Code", theme:"Infrastructure", trigger:"Manual", schedule:"On demand", status:"active", model:"Opus", promptDocId:"1FkUbVj-ya60fOGsw0w25uFJthba9igD0AnESrhEz7no", dependencies:"GDrive MCP, Agent Template", description:"Workspace for building and modifying Claude agents, fixing issues, updating MCP configs", class:"Blacksmith" },
  { id:"drive-organizer", name:"Drive Organizer PM Bot", type:"Claude Code", theme:"Infrastructure", trigger:"Manual + Reactive", schedule:"On demand + Queue", status:"active", model:"Haiku + Sonnet", promptDocId:"1zsvJnlnWRZeklB8kvmZv-rpTeIOZI2nxGw68yoe8xHY", dependencies:"GDrive MCP, PM Tasks Queue, Brand Config", description:"Formats and organizes Google Drive workspace files \u2014 applies brand, processes formatting queue", class:"Librarian" },
  { id:"transcript-pm", name:"Transcript PM Bot", type:"Webhook (Vercel)", theme:"Operations", trigger:"Auto \u2014 Zapier", schedule:"On trigger", status:"testing", model:"Haiku", promptDocId:"1ianR88fcAGhU_uuDKl0E47UDd5v8OuFzHxn5piQwUz0", dependencies:"Vercel, Anthropic API, Asana, Zapier", description:"Processes meeting transcripts, extracts action items, creates Asana tasks", class:"Scribe" },
  { id:"sop-updater", name:"SOP Updater", type:"Claude Code", theme:"Operations", trigger:"Manual", schedule:"On demand", status:"active", model:"Haiku \u2192 Sonnet", promptDocId:"1DgAc5muVc_M081BG30fq2ZCc27cUO2HUw74IQnfIkcI", dependencies:"GDrive MCP, Content Capture Queue", description:"Processes Content Capture Queue \u2014 classifies insights, proposes SOP edits", class:"Cartographer" },
  { id:"general-assistant", name:"General Assistant", type:"Webhook (Vercel)", theme:"Infrastructure", trigger:"Manual \u2014 API", schedule:"On demand", status:"active", model:"Haiku + Sonnet", promptDocId:"", dependencies:"Vercel, Anthropic API, Google SA, Master Brain Doc", description:"General-purpose personal assistant via iOS Shortcut or API", class:"Adventurer" },
  { id:"bhavani", name:"Bhavani", type:"Webhook (Vercel)", theme:"Infrastructure", trigger:"Auto \u2014 WhatsApp", schedule:"On message", status:"active", model:"Haiku + Sonnet", promptDocId:"", dependencies:"Vercel, Anthropic API, WhatsApp Cloud API, Master Brain Doc", description:"WhatsApp-based personal assistant with conversation memory", class:"Messenger Spirit" }
];

// ── STAT CALCULATORS ──
function calcIntelligence(model) {
  const m = model.toLowerCase();
  if (m.includes('opus')) return 100;
  if (m === 'sonnet') return 75;
  if (m.includes('\u2192') && m.includes('sonnet')) return 65;
  if (m.includes('+') && m.includes('sonnet')) return 60;
  if (m === 'haiku') return 40;
  return 50;
}
function calcAutonomy(trigger) {
  const t = trigger.toLowerCase();
  if (t.includes('auto') && !t.includes('manual')) return 90;
  if (t.includes('scheduled') && !t.includes('manual')) return 70;
  if (t.includes('manual') && t.includes('scheduled')) return 50;
  if (t.includes('manual') && t.includes('reactive')) return 40;
  if (t.includes('api')) return 30;
  if (t.includes('manual')) return 20;
  return 50;
}
function calcSpeed(model) {
  const m = model.toLowerCase();
  if (m === 'haiku') return 95;
  if (m.includes('+') && m.includes('haiku')) return 80;
  if (m.includes('\u2192') && m.includes('haiku')) return 75;
  if (m === 'sonnet') return 60;
  if (m.includes('opus')) return 40;
  return 60;
}
function calcVersatility(deps) {
  const count = deps.split(',').filter(d => d.trim()).length;
  return Math.min(100, Math.max(20, count * 18));
}

// ── RENDER HEADER STATS ──
function renderHeader() {
  const total = agents.length;
  const active = agents.filter(a => a.status === 'active').length;
  const testing = agents.filter(a => a.status === 'testing').length;
  document.getElementById('headerStats').innerHTML = `
    <div>${total} AGENTS</div>
    <div><span class="stat-dot active"></span><span>${active}</span> ACTIVE</div>
    ${testing > 0 ? `<div><span class="stat-dot testing"></span><span>${testing}</span> TESTING</div>` : ''}
  `;
}

// ── RENDER CARDS ──
function renderCards(filter = 'all') {
  const grid = document.getElementById('grid');
  const filtered = filter === 'all' ? agents : agents.filter(a => a.theme === filter);
  grid.innerHTML = filtered.map((a, i) => {
    const int = calcIntelligence(a.model);
    const aut = calcAutonomy(a.trigger);
    const spd = calcSpeed(a.model);
    const vrs = calcVersatility(a.dependencies);
    // Stagger animation delays so agents bob out of sync
    const bobDelay = (i * 0.35) % 2.5;
    const breatheDelay = (i * 0.5) % 2.5;
    const glowDelay = (i * 0.4) % 3;
    return `
    <div class="card" onclick="openModal('${a.id}')">
      <div class="card-top">
        <div class="avatar-bob" style="animation-delay:${bobDelay}s">
          <div class="avatar-frame" style="animation-delay:${glowDelay}s">
            <img class="avatar-img" src="avatars/${a.id}.png" alt="${a.name}" style="animation-delay:${breatheDelay}s" onerror="this.style.display='none'">
            <div class="avatar-shadow"></div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-name">${a.name}</div>
          <div class="card-class">${a.class}</div>
          <div class="card-badges">
            <span class="badge badge-theme ${a.theme}">${a.theme}</span>
            <span class="badge badge-status ${a.status}">${a.status}</span>
            <span class="badge badge-type">${a.type}</span>
          </div>
        </div>
      </div>
      <div class="card-stats">
        <div class="stat-row"><span class="stat-label">INT</span><div class="stat-bar-bg"><div class="stat-bar-fill int" style="width:${int}%"></div></div></div>
        <div class="stat-row"><span class="stat-label">AUT</span><div class="stat-bar-bg"><div class="stat-bar-fill aut" style="width:${aut}%"></div></div></div>
        <div class="stat-row"><span class="stat-label">SPD</span><div class="stat-bar-bg"><div class="stat-bar-fill spd" style="width:${spd}%"></div></div></div>
        <div class="stat-row"><span class="stat-label">VRS</span><div class="stat-bar-bg"><div class="stat-bar-fill vrs" style="width:${vrs}%"></div></div></div>
      </div>
      <div class="card-footer">
        <div class="card-desc" title="${a.description}">${a.description}</div>
        ${a.promptDocId ? `<a class="card-prompt-btn" href="https://docs.google.com/document/d/${a.promptDocId}/edit" target="_blank" onclick="event.stopPropagation()">PROMPT</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL (read-only) ──
function openModal(id) {
  const a = agents.find(x => x.id === id);
  if (!a) return;
  const int = calcIntelligence(a.model);
  const aut = calcAutonomy(a.trigger);
  const spd = calcSpeed(a.model);
  const vrs = calcVersatility(a.dependencies);
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar-wrap">
        <div class="modal-avatar">
          <img src="avatars/${a.id}.png" alt="${a.name}" onerror="this.style.display='none'">
        </div>
      </div>
      <div>
        <div class="modal-title">${a.name}</div>
        <div class="modal-class">${a.class} / ${a.type}</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-stats">
        <div class="stat-row"><span class="stat-label">INT</span><div class="stat-bar-bg"><div class="stat-bar-fill int" style="width:${int}%"></div></div><span class="stat-val">${int}</span></div>
        <div class="stat-row"><span class="stat-label">AUT</span><div class="stat-bar-bg"><div class="stat-bar-fill aut" style="width:${aut}%"></div></div><span class="stat-val">${aut}</span></div>
        <div class="stat-row"><span class="stat-label">SPD</span><div class="stat-bar-bg"><div class="stat-bar-fill spd" style="width:${spd}%"></div></div><span class="stat-val">${spd}</span></div>
        <div class="stat-row"><span class="stat-label">VRS</span><div class="stat-bar-bg"><div class="stat-bar-fill vrs" style="width:${vrs}%"></div></div><span class="stat-val">${vrs}</span></div>
      </div>
      <div class="detail-row"><span class="detail-label">STATUS</span><span class="detail-value"><span class="badge badge-status ${a.status}" style="font-size:10px">${a.status.toUpperCase()}</span></span></div>
      <div class="detail-row"><span class="detail-label">THEME</span><span class="detail-value"><span class="badge badge-theme ${a.theme}" style="font-size:10px">${a.theme}</span></span></div>
      <div class="detail-row"><span class="detail-label">MODEL</span><span class="detail-value">${a.model}</span></div>
      <div class="detail-row"><span class="detail-label">TRIGGER</span><span class="detail-value">${a.trigger}</span></div>
      <div class="detail-row"><span class="detail-label">SCHEDULE</span><span class="detail-value">${a.schedule}</span></div>
      <div class="detail-row"><span class="detail-label">DEPENDS ON</span><span class="detail-value">${a.dependencies}</span></div>
      <div class="detail-row"><span class="detail-label">MISSION</span><span class="detail-value desc">${a.description}</span></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-close" onclick="closeModal()">CLOSE</button>
      ${a.promptDocId ? `<a class="btn btn-prompt" href="https://docs.google.com/document/d/${a.promptDocId}/edit" target="_blank">VIEW PROMPT DOC</a>` : '<span></span>'}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── FILTERS ──
let currentFilter = 'all';
document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderCards(currentFilter);
});

// ── CLOSE MODAL ON OVERLAY CLICK ──
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── CLOSE MODAL ON ESC ──
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ──
renderHeader();
renderCards();
</script>
</body>
</html>
